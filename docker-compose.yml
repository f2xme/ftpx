version: '3.8'

services:
  # FTP 测试服务器
  ftp-server:
    image: fauria/vsftpd
    container_name: ftpx-ftp-test
    ports:
      - "21:21"
      - "21000-21010:21000-21010"
    environment:
      - FTP_USER=testuser
      - FTP_PASS=testpass
      - PASV_ADDRESS=127.0.0.1
      - PASV_MIN_PORT=21000
      - PASV_MAX_PORT=21010
      - WRITE_ENABLE=YES
    volumes:
      - ftp-data:/home/vsftpd/testuser
    restart: unless-stopped

  # SFTP 测试服务器
  sftp-server:
    image: atmoz/sftp
    container_name: ftpx-sftp-test
    ports:
      - "2222:22"
    command: testuser:testpass:1001
    volumes:
      - sftp-data:/home/testuser/upload
    restart: unless-stopped

  # FTPS 测试服务器 (使用 vsftpd 配置 TLS)
  ftps-server:
    image: fauria/vsftpd
    container_name: ftpx-ftps-test
    ports:
      - "990:21"
      - "21100-21110:21100-21110"
    environment:
      - FTP_USER=testuser
      - FTP_PASS=testpass
      - PASV_ADDRESS=127.0.0.1
      - PASV_MIN_PORT=21100
      - PASV_MAX_PORT=21110
      - SSL_ENABLE=YES
      - WRITE_ENABLE=YES
    volumes:
      - ftps-data:/home/vsftpd/testuser
    restart: unless-stopped

volumes:
  ftp-data:
  sftp-data:
  ftps-data:
