name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CGO_ENABLED: "0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go test ./...

      - run: go build -v ./...

  package:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: ftpx-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: ftpx-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact: ftpx-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: ftpx-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: ftpx-windows-amd64
          - goos: windows
            goarch: arm64
            artifact: ftpx-windows-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build package
        run: |
          mkdir -p dist
          binary=ftpx
          if [ "${{ matrix.goos }}" = "windows" ]; then
            binary=ftpx.exe
          fi

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o "dist/$binary" .
          cp README.md LICENSE config.example.yaml dist/

          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd dist && zip -r "../${{ matrix.artifact }}.zip" .)
          else
            tar -czf "${{ matrix.artifact }}.tar.gz" -C dist .
          fi
          sha256sum "${{ matrix.artifact }}".* > "${{ matrix.artifact }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --title "$TAG" --generate-notes
          fi
